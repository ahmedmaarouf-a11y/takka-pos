<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takka POS | 3D Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0ea5e9; --primary-dark: #0284c7;
            --success: #10b981; --success-dark: #059669;
            --warning: #f59e0b; --warning-dark: #d97706;
            --danger: #ef4444; --danger-dark: #b91c1c;
            --bg: #f0f9ff; --surface: #ffffff; --text: #1e293b;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg); background-image: radial-gradient(#bae6fd 1px, transparent 1px);
            background-size: 20px 20px; height: 100vh; display: flex; flex-direction: column;
            color: var(--text); overflow: hidden;
        }

        /* نظام الإشعارات الاحترافي (بديل الـ Alert) */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px);
            background: var(--success); color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: bold; font-size: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 9999; opacity: 0;
        }

        /* النوافذ المنبثقة (بديل الـ Prompt/Alert) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-card {
            background: var(--surface); width: 500px; max-height: 80vh; overflow-y: auto;
            border-radius: 25px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: popUp 0.3s ease-out;
        }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; color: var(--primary); }
        .close-btn { background: none; border: none; font-size: 24px; color: var(--danger); cursor: pointer; font-weight: bold; }

        /* شريط علوي 3D */
        .topbar {
            background: var(--surface); padding: 15px 30px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 26px; color: var(--primary); }
        .logo svg { width: 40px; height: 40px; }

        /* أزرار 3D احترافية */
        .btn-3d {
            background: var(--surface); border: 2px solid #e2e8f0; padding: 10px 20px;
            border-radius: 12px; cursor: pointer; font-weight: bold; color: #475569;
            box-shadow: 0 4px 0 #cbd5e1; transition: all 0.1s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 0 0 #cbd5e1; }
        
        .btn-primary-3d { background: var(--primary); color: white; border: none; box-shadow: 0 6px 0 var(--primary-dark); }
        .btn-primary-3d:active { transform: translateY(6px); box-shadow: 0 0 0 var(--primary-dark); }

        .btn-success-3d { background: var(--success); color: white; border: none; box-shadow: 0 6px 0 var(--success-dark); }
        .btn-success-3d:active { transform: translateY(6px); box-shadow: 0 0 0 var(--success-dark); }

        .btn-warning-3d { background: var(--warning); color: white; border: none; box-shadow: 0 6px 0 var(--warning-dark); }
        .btn-warning-3d:active { transform: translateY(6px); box-shadow: 0 0 0 var(--warning-dark); }

        .btn-danger-3d { background: var(--danger); color: white; border: none; box-shadow: 0 4px 0 var(--danger-dark); padding: 10px; }
        .btn-danger-3d:active { transform: translateY(4px); box-shadow: 0 0 0 var(--danger-dark); }

        .main-container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }

        /* منطقة المنتجات والتصنيفات */
        .products-section { flex: 1; display: flex; flex-direction: column; gap: 20px; overflow: hidden; }
        
        .categories-bar { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .cat-tab {
            background: var(--surface); padding: 12px 30px; border-radius: 50px; cursor: pointer;
            font-weight: bold; border: 2px solid transparent; box-shadow: 0 4px 0 #cbd5e1;
            transition: all 0.1s; white-space: nowrap; color: #64748b;
        }
        .cat-tab:active { transform: translateY(4px); box-shadow: 0 0 0 #cbd5e1; }
        .cat-tab.active { background: var(--primary); color: white; box-shadow: 0 4px 0 var(--primary-dark); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; overflow-y: auto; padding-bottom: 20px; padding-right: 5px; }
        
        /* كارت المنتج 3D */
        .product-card {
            background: var(--surface); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05), inset 0 -4px 0 rgba(0,0,0,0.05); transition: 0.2s; border: 1px solid #f1f5f9;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 25px rgba(14, 165, 233, 0.15), inset 0 -4px 0 var(--primary); }
        .product-card:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(14, 165, 233, 0.1), inset 0 -2px 0 var(--primary); }
        .p-icon { font-size: 45px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .p-name { font-weight: 900; font-size: 16px; margin-bottom: 8px; color: #334155; }
        .p-price { color: var(--primary); font-weight: 900; font-size: 18px; }

        /* السلة الجانبية */
        .cart-sidebar {
            width: 380px; background: var(--surface); border-radius: 25px;
            display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .cart-header { padding: 25px; border-bottom: 2px solid #f1f5f9; font-size: 22px; font-weight: 900; color: var(--primary); display: flex; justify-content: space-between; align-items: center;}
        .cart-items { flex: 1; padding: 20px; overflow-y: auto; }
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 12px;
            font-weight: bold; border: 1px solid #e2e8f0; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .checkout-box { padding: 25px; background: #f8fafc; border-top: 2px solid #e2e8f0; }
        .total-row { display: flex; justify-content: space-between; font-size: 26px; font-weight: 900; margin-bottom: 25px; color: #0f172a; }
        .btn-action { width: 100%; padding: 18px; font-size: 18px; margin-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; }
    </style>
</head>
<body>

    <div id="toast">تمت العملية بنجاح</div>

    <div class="modal-overlay" id="ordersModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="m-title">الطلبات السابقة</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <table>
                <thead><tr><th id="th-order">رقم الطلب</th><th id="th-total">الإجمالي</th><th id="th-status">الحالة</th></tr></thead>
                <tbody id="orders-tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="topbar">
        <div class="logo">
            <svg viewBox="0 0 100 100">
                <path d="M25,60 C25,45 35,35 50,35 C55,20 75,20 80,35 C95,35 95,55 85,65 L25,65 Z" fill="#bae6fd"/>
                <path d="M35,55 L45,65 L75,35" fill="none" stroke="#0ea5e9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            TAKKA POS
        </div>
        <div class="top-btns">
            <button class="btn-3d" onclick="openOrdersModal()" id="t-recent">الطلبات السابقة</button>
            <button class="btn-3d" onclick="toggleLang()" id="t-lang">English</button>
            <button class="btn-3d btn-primary-3d" onclick="loadMenu()" id="t-sync">🔄 تحديث المنيو</button>
        </div>
    </div>

    <div class="main-container">
        <div class="products-section">
            <div class="categories-bar" id="cats-container">
                <div class="cat-tab active" onclick="filterMenu('all')">الكل</div>
            </div>
            <div class="grid" id="menu-grid">
                <p style="text-align:center; grid-column:1/-1; color:#64748b; font-weight:bold; margin-top:50px;">جاري تحميل الأصناف...</p>
            </div>
        </div>

        <div class="cart-sidebar">
            <div class="cart-header">
                <span id="t-cart">🛒 السلة الحالية</span>
                <button class="btn-3d btn-danger-3d" style="padding: 8px 12px; font-size:12px;" onclick="clearCart()" id="t-clear">مسح</button>
            </div>
            <div class="cart-items" id="cart-list"></div>
            <div class="checkout-box">
                <div class="total-row"><span id="t-total">الإجمالي:</span><span style="color:var(--primary)"><span id="total-val">0</span> ج.م</span></div>
                <button class="btn-3d btn-success-3d btn-action" onclick="checkout('Completed')" id="t-pay">دفع وإنهاء</button>
                <button class="btn-3d btn-warning-3d btn-action" onclick="checkout('Active')" id="t-kit" style="margin-bottom:0;">إرسال للمطبخ</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let cart = []; let allProducts = []; let currentCategory = 'all'; let lang = 'ar';
        
        const dict = {
            ar: { recent: 'الطلبات السابقة', lang: 'English', sync: '🔄 تحديث', cart: '🛒 السلة الحالية', empty: 'السلة فارغة', total: 'الإجمالي:', pay: 'دفع وإنهاء', kit: 'للمطبخ', clear: 'مسح', all: 'الكل', dir: 'rtl', curr: 'ج.م', msgSucc: '✅ تم إرسال الطلب بنجاح', msgErr: '❌ حدث خطأ!', msgEmpty: '⚠️ السلة فارغة!', modTitle: 'الطلبات السابقة', thOrder: 'الرقم', thTotal: 'الإجمالي', thStatus: 'الحالة' },
            en: { recent: 'Recent Orders', lang: 'العربية', sync: '🔄 Sync', cart: '🛒 Current Cart', empty: 'Cart is empty', total: 'Total:', pay: 'Pay & Finish', kit: 'To Kitchen', clear: 'Clear', all: 'All', dir: 'ltr', curr: 'EGP', msgSucc: '✅ Order Sent Successfully', msgErr: '❌ Error occurred!', msgEmpty: '⚠️ Cart is empty!', modTitle: 'Recent Orders', thOrder: 'Order No', thTotal: 'Total', thStatus: 'Status' }
        };

        // دالة الإشعارات الاحترافية
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = isError ? 'var(--danger)' : 'var(--success)';
            toast.style.transform = 'translate(-50%, 0)';
            toast.style.opacity = '1';
            setTimeout(() => { 
                toast.style.transform = 'translate(-50%, -100px)'; 
                toast.style.opacity = '0'; 
            }, 3000);
        }

        function closeModal() { document.getElementById('ordersModal').style.display = 'none'; }
        
        async function openOrdersModal() {
            document.getElementById('ordersModal').style.display = 'flex';
            document.getElementById('orders-tbody').innerHTML = '<tr><td colspan="3" style="text-align:center;">جاري التحميل...</td></tr>';
            const { data } = await supabaseClient.from('sales').select('*').order('created_at', {ascending: false}).limit(10);
            if(data) {
                document.getElementById('orders-tbody').innerHTML = data.map(o => `
                    <tr><td style="font-weight:bold;">${o.order_no}</td><td style="color:var(--primary); font-weight:bold;">${o.total} ${dict[lang].curr}</td><td>${o.status}</td></tr>
                `).join('');
            }
        }

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar'; const t = dict[lang];
            document.getElementById('html-root').dir = t.dir;
            document.getElementById('t-lang').innerText = t.lang;
            document.getElementById('t-sync').innerText = t.sync;
            document.getElementById('t-cart').innerText = t.cart;
            document.getElementById('t-total').innerText = t.total;
            document.getElementById('t-pay').innerText = t.pay;
            document.getElementById('t-kit').innerText = t.kit;
            document.getElementById('t-clear').innerText = t.clear;
            document.getElementById('t-recent').innerText = t.recent;
            document.getElementById('m-title').innerText = t.modTitle;
            document.getElementById('th-order').innerText = t.thOrder;
            document.getElementById('th-total').innerText = t.thTotal;
            document.getElementById('th-status').innerText = t.thStatus;
            
            const allTab = document.querySelector('.cat-tab[onclick="filterMenu(\\'all\\')"]');
            if(allTab) allTab.innerText = t.all;
            renderMenu(); renderCart();
        }

        async function loadMenu() {
            const btn = document.getElementById('t-sync'); btn.style.opacity = '0.5';
            const { data: cats } = await supabaseClient.from('categories').select('*');
            if(cats) {
                let catHTML = `<div class="cat-tab ${currentCategory === 'all' ? 'active' : ''}" onclick="filterMenu('all')">${dict[lang].all}</div>`;
                cats.forEach(c => { catHTML += `<div class="cat-tab ${currentCategory === c.name ? 'active' : ''}" onclick="filterMenu('${c.name}')">${c.name}</div>`; });
                document.getElementById('cats-container').innerHTML = catHTML;
            }
            const { data: prods } = await supabaseClient.from('products').select('*');
            if(prods) { allProducts = prods; renderMenu(); showToast(lang==='ar'?'تم تحديث المنيو':'Menu Updated'); }
            btn.style.opacity = '1';
        }

        function filterMenu(catName) {
            currentCategory = catName;
            document.querySelectorAll('.cat-tab').forEach(el => {
                el.classList.remove('active');
                if(el.innerText === catName || (catName === 'all' && el.innerText === dict[lang].all)) el.classList.add('active');
            });
            renderMenu();
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            const filtered = currentCategory === 'all' ? allProducts : allProducts.filter(p => p.category === currentCategory);
            if(filtered.length === 0) { grid.innerHTML = `<p style="text-align:center; grid-column:1/-1; color:#64748b;">لا يوجد أصناف.</p>`; return; }
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="addToCart('${p.name}', ${p.price})">
                    <div class="p-icon">🍔</div><div class="p-name">${p.name}</div><div class="p-price">${p.price} ${dict[lang].curr}</div>
                </div>`).join('');
        }

        function addToCart(n, p) { cart.push({n, p}); renderCart(); }
        function clearCart() { cart = []; renderCart(); }
        
        function renderCart() {
            const list = document.getElementById('cart-list');
            if(!cart.length) { 
                list.innerHTML = `<div style="text-align:center; color:#94a3b8; font-weight:bold; margin-top:40px;">${dict[lang].empty}</div>`; 
                document.getElementById('total-val').innerText = '0'; return; 
            }
            list.innerHTML = cart.map((i, idx) => `
                <div class="cart-item">
                    <span>${i.n}</span>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span style="color:var(--primary)">${i.p}</span>
                        <button class="btn-3d btn-danger-3d" style="padding:5px 10px; font-size:14px; box-shadow:0 3px 0 var(--danger-dark)" onclick="cart.splice(${idx},1); renderCart()">×</button>
                    </div>
                </div>`).join('');
            document.getElementById('total-val').innerText = cart.reduce((s, i) => s + i.p, 0);
        }

        async function checkout(status) {
            if(!cart.length) return showToast(dict[lang].msgEmpty, true);
            const total = cart.reduce((s, i) => s + i.p, 0);
            const items = cart.map(i => i.n).join(', ');
            
            const btn = document.getElementById(status === 'Completed' ? 't-pay' : 't-kit');
            const originalText = btn.innerText; btn.innerText = "⏳..."; btn.disabled = true;
            
            const { error } = await supabaseClient.from('sales').insert([{ order_no: 'TK-' + Math.floor(1000 + Math.random() * 9000), items, total, status }]);
            
            btn.innerText = originalText; btn.disabled = false;
            if(error) showToast(dict[lang].msgErr, true);
            else { clearCart(); showToast(dict[lang].msgSucc); }
        }

        loadMenu(); renderCart();
    </script>
</body>
</html>

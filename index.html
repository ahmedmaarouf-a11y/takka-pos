<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Takka POS | نقطة البيع</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-blue: #2563eb; --dark-bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; color: var(--text);
        }
        /* الشريط الجانبي (السلة) */
        .sidebar { width: 400px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border-left: 1px solid #334155; padding: 25px; display: flex; flex-direction: column; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { width: 100px; filter: drop-shadow(0 0 10px var(--main-blue)); }
        
        /* منطقة المنتجات */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .product-card { 
            background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; 
            cursor: pointer; border: 1px solid #334155; transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--main-blue); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .product-card b { color: var(--main-blue); font-size: 1.2em; display: block; margin-top: 10px; }

        /* السلة */
        .cart-list { flex: 1; overflow-y: auto; margin: 20px 0; border-top: 1px solid #334155; }
        .cart-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #334155; }
        .total-box { font-size: 24px; font-weight: bold; padding: 20px 0; border-top: 2px dashed var(--main-blue); display: flex; justify-content: space-between; }
        
        /* الأزرار */
        .btn { padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        .btn-kitchen { background: #f59e0b; color: white; }
        .btn-pay { background: var(--main-blue); color: white; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="main-content">
        <h2 style="margin-bottom: 30px; border-right: 5px solid var(--main-blue); padding-right: 15px;">المنيو 🌮</h2>
        <div id="product-grid" class="grid">
            </div>
    </div>

    <div class="sidebar">
        <div class="logo-container">
            <img src="https://via.placeholder.com/100x100/2563eb/ffffff?text=TAKKA" alt="Logo">
            <h3>TAKKA SYSTEM</h3>
        </div>
        
        <div id="cart-list" class="cart-list">
            <p style="text-align:center; color:#94a3b8; margin-top:50px;">السلة فارغة</p>
        </div>

        <div class="total-box">
            <span>الإجمالي:</span>
            <span><span id="total-val">0</span> ج.م</span>
        </div>

        <button class="btn btn-kitchen" onclick="checkout('Active')">إرسال للمطبخ 👨‍🍳</button>
        <button class="btn btn-pay" onclick="checkout('Completed')">دفع كاش مباشر 💵</button>
    </div>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let cart = [];

        // سحب المنتجات من الجدول اللي إنت رفعته
        async function loadProducts() {
            const { data, error } = await supabaseClient.from('products').select('*');
            if (data) {
                document.getElementById('product-grid').innerHTML = data.map(p => `
                    <div class="product-card" onclick="addToCart('${p.name}', ${p.price})">
                        <div style="font-size: 2em;">🍔</div>
                        <div>${p.name}</div>
                        <b>${p.price} ج.م</b>
                    </div>
                `).join('');
            }
        }

        function addToCart(name, price) {
            cart.push({name, price});
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            if(!cart.length) { list.innerHTML = '<p style="text-align:center; margin-top:50px;">السلة فارغة</p>'; return; }
            list.innerHTML = cart.map(i => `<div class="cart-item"><span>${i.name}</span><span>${i.price}ج.م</span></div>`).join('');
            document.getElementById('total-val').innerText = cart.reduce((s, i) => s + i.price, 0);
        }

        async function checkout(status) {
            if(!cart.length) return alert("السلة فاضية!");
            const total = cart.reduce((s, i) => s + i.price, 0);
            const items = cart.map(i => i.name).join(', ');
            
            const { error } = await supabaseClient.from('sales').insert([{
                order_no: 'TK-' + Date.now().toString().slice(-6),
                items: items,
                total: total,
                status: status
            }]);

            if(!error) { alert("تم تسجيل الطلب!"); cart = []; renderCart(); }
        }

        loadProducts();
    </script>
</body>
</html>

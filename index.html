<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Takka POS | نقطة البيع</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); }
        .sidebar { width: 350px; background: var(--card); border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .p-card { background: #020617; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #334155; }
        .p-card:active { transform: scale(0.95); }
        .p-card b { display: block; color: var(--p); margin-top: 8px; }
        .cart-items { flex: 1; overflow-y: auto; margin: 20px 0; border-top: 1px solid #334155; padding-top: 10px; }
        .btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; }
        .btn-k { background: #f59e0b; color: white; }
        .btn-p { background: var(--p); color: white; }
    </style>
</head>
<body>
    <div class="main">
        <h2 style="border-right: 4px solid var(--p); padding-right: 10px;">المنيو 🌮</h2>
        <div class="grid" id="menu"></div>
    </div>
    <div class="sidebar">
        <h2 style="text-align:center">طلب جديد</h2>
        <div id="cart" class="cart-items">السلة فارغة</div>
        <div style="font-size: 22px; font-weight: bold; margin-bottom: 10px;">الإجمالي: <span id="total">0</span> ج.م</div>
        <button class="btn btn-k" onclick="send('Active')">إرسال للمطبخ 👨‍🍳</button>
        <button class="btn btn-p" onclick="send('Completed')">تحصيل كاش 💵</button>
    </div>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let cart = [];

        async function load() {
            const { data } = await supabaseClient.from('products').select('*');
            document.getElementById('menu').innerHTML = data.map(p => `
                <div class="p-card" onclick="add('${p.name}', ${p.price})">🍔<br>${p.name}<b>${p.price}ج</b></div>
            `).join('');
        }
        function add(n, p) { cart.push({n, p}); render(); }
        function render() {
            document.getElementById('cart').innerHTML = cart.map(i => `<div>• ${i.n} (${i.p}ج)</div>`).join('');
            document.getElementById('total').innerText = cart.reduce((a, b) => a + b.p, 0);
        }
        async function send(st) {
            if(!cart.length) return;
            const { error } = await supabaseClient.from('sales').insert([{
                order_no: 'TK-'+Date.now().toString().slice(-5),
                items: cart.map(i => i.n).join(', '),
                total: cart.reduce((a, b) => a + b.p, 0),
                status: st
            }]);
            if(!error) { alert("تم!"); cart = []; render(); }
        }
        load();
    </script>
</body>
</html>

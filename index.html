<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Takka POS - الكاشير</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; margin: 0; background: #f1f5f9; display: flex; height: 100vh; }
        .menu { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; align-content: start; }
        .card { background: white; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card b { display: block; color: #2563eb; margin-top: 5px; }
        .sidebar { width: 350px; background: white; padding: 20px; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; color: white; font-size: 16px; }
        #cart-items { flex: 1; overflow-y: auto; margin: 15px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="menu" id="menu">
        <div class="card" onclick="add('شاورما دجاج', 80)">شاورما دجاج<b>80 ج.م</b></div>
        <div class="card" onclick="add('شاورما لحم', 95)">شاورما لحم<b>95 ج.م</b></div>
        <div class="card" onclick="add('بطاطس', 35)">بطاطس<b>35 ج.م</b></div>
        <div class="card" onclick="add('مشروب غازي', 25)">مشروب غازي<b>25 ج.م</b></div>
    </div>
    <div class="sidebar">
        <h2>أوردر جديد 🍔</h2>
        <div id="cart-items">السلة فارغة</div>
        <h3 id="total-price">إجمالي: 0 ج.م</h3>
        <button class="btn" style="background: #f59e0b;" onclick="send('Active')">إرسال للمطبخ 👨‍🍳</button>
        <button class="btn" style="background: #10b981;" onclick="send('Completed')">دفع كاش مباشر 💵</button>
    </div>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let cart = [];

        function add(n, p) { cart.push({n, p}); render(); }
        function render() {
            document.getElementById('cart-items').innerHTML = cart.map(i => `<div>• ${i.n} (${i.p}ج.م)</div>`).join('');
            document.getElementById('total-price').innerText = "إجمالي: " + cart.reduce((a, b) => a + b.p, 0) + " ج.م";
        }
        async function send(status) {
            if(!cart.length) return alert("السلة فاضية");
            const { error } = await supabaseClient.from('sales').insert([{
                order_no: 'TK-'+Math.floor(Date.now()/1000),
                items: cart.map(i => i.n).join(', '),
                total: cart.reduce((a, b) => a + b.p, 0),
                status: status
            }]);
            if(!error) { alert("تم التسجيل!"); cart = []; render(); }
        }
    </script>
</body>
</html>

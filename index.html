<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>Takka POS | نقطة البيع</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0ea5e9; --primary-hover: #0284c7; --bg: #f0f9ff; --surface: #ffffff; --text: #0f172a; --border: #e0f2fe; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg); color: var(--text); }
        
        /* شريط علوي احترافي */
        .topbar { background: var(--surface); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); box-shadow: 0 2px 10px rgba(14, 165, 233, 0.05); }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 24px; color: var(--primary); letter-spacing: 1px; }
        .logo svg { width: 32px; height: 32px; }
        .top-btns { display: flex; gap: 12px; }
        .btn-outline { background: var(--surface); border: 2px solid var(--border); padding: 8px 16px; border-radius: 8px; color: var(--text); font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sync { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-sync:hover { background: var(--primary-hover); }

        .main-container { display: flex; flex: 1; overflow: hidden; } 
        
        /* منطقة المنيو */
        .products-area { flex: 1; padding: 24px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(14, 165, 233, 0.05); }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 15px rgba(14, 165, 233, 0.15); }
        .card-icon { font-size: 40px; margin-bottom: 10px; }
        .card-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .card-price { color: var(--primary); font-weight: 900; font-size: 18px; }

        /* السلة */
        .sidebar-cart { width: 350px; background: var(--surface); display: flex; flex-direction: column; border-right: 2px solid var(--border); box-shadow: -4px 0 15px rgba(0,0,0,0.02); z-index: 10; }
        .cart-header { padding: 20px; border-bottom: 2px solid var(--border); font-size: 20px; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 10px;}
        .cart-items { flex: 1; padding: 20px; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg); border-radius: 8px; margin-bottom: 10px; font-weight: bold; border: 1px solid var(--border); }
        .cart-item button { color: #ef4444; background: none; border: none; font-size: 18px; cursor: pointer; }
        
        /* منطقة الدفع */
        .checkout-box { padding: 24px; border-top: 2px solid var(--border); background: var(--surface); }
        .total-row { display: flex; justify-content: space-between; font-weight: 900; font-size: 22px; margin-bottom: 20px; color: var(--text); }
        .btn-pay { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-kitchen { width: 100%; background: #f59e0b; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-pay:hover { background: var(--primary-hover); }
        .btn-kitchen:hover { background: #d97706; }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg> 
            TAKKA
        </div>
        <div class="top-btns">
            <button class="btn-sync" onclick="syncMenu()" id="t-sync">🔄 مزامنة</button>
            <button class="btn-outline" onclick="toggleLang()" id="t-lang">English</button>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar-cart">
            <div class="cart-header" id="t-cart-title">🛒 السلة الحالية</div>
            <div class="cart-items" id="cart-list"></div>
            <div class="checkout-box">
                <div class="total-row"><span id="t-total">الإجمالي:</span><span style="color: var(--primary);"><span id="total-val">0</span> ج</span></div>
                <button class="btn-pay" onclick="checkout('Completed')" id="t-pay">دفع وإنهاء</button>
                <button class="btn-kitchen" onclick="checkout('Active')" id="t-kit">للمطبخ</button>
            </div>
        </div>

        <div class="products-area">
            <div class="grid" id="menu-grid"></div>
        </div>
    </div>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let cart = [];
        let lang = 'ar';
        const dict = {
            ar: { sync: '🔄 مزامنة', lang: 'English', cartTitle: '🛒 السلة الحالية', total: 'الإجمالي:', pay: '💵 دفع وإنهاء', kit: '👨‍🍳 للمطبخ', empty: 'السلة فارغة', dir: 'rtl' },
            en: { sync: '🔄 Sync Menu', lang: 'العربية', cartTitle: '🛒 Current Cart', total: 'Total:', pay: '💵 Pay & Finish', kit: '👨‍🍳 To Kitchen', empty: 'Cart is empty', dir: 'ltr' }
        };

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            document.getElementById('html-root').dir = dict[lang].dir;
            document.getElementById('t-sync').innerText = dict[lang].sync;
            document.getElementById('t-lang').innerText = dict[lang].lang;
            document.getElementById('t-cart-title').innerText = dict[lang].cartTitle;
            document.getElementById('t-total').innerText = dict[lang].total;
            document.getElementById('t-pay').innerText = dict[lang].pay;
            document.getElementById('t-kit').innerText = dict[lang].kit;
            renderCart();
        }

        async function syncMenu() {
            const btn = document.getElementById('t-sync');
            btn.style.opacity = '0.5';
            const { data } = await supabaseClient.from('products').select('*');
            btn.style.opacity = '1';
            
            if(data) {
                document.getElementById('menu-grid').innerHTML = data.map(p => `
                    <div class="card" onclick="addToCart('${p.name}', ${p.price})">
                        <div class="card-icon">🍔</div>
                        <div class="card-name">${p.name}</div>
                        <div class="card-price">${p.price}</div>
                    </div>
                `).join('');
            }
        }

        function addToCart(n, p) { cart.push({n, p}); renderCart(); }
        function renderCart() {
            const list = document.getElementById('cart-list');
            if(!cart.length) { list.innerHTML = `<div style="text-align:center; color:#94a3b8; margin-top:20px; font-weight:bold">${dict[lang].empty}</div>`; document.getElementById('total-val').innerText = '0'; return; }
            list.innerHTML = cart.map((i, idx) => `
                <div class="cart-item">
                    <span>${i.n}</span>
                    <div><span style="color:var(--primary); margin:0 10px">${i.p}</span> <button onclick="cart.splice(${idx},1); renderCart()">×</button></div>
                </div>
            `).join('');
            document.getElementById('total-val').innerText = cart.reduce((s, i) => s + i.p, 0);
        }

        async function checkout(status) {
            if(!cart.length) return;
            const total = cart.reduce((s, i) => s + i.p, 0);
            const items = cart.map(i => i.n).join(', ');
            await supabaseClient.from('sales').insert([{ order_no: 'TK-'+Math.floor(Date.now()/1000), items, total, status }]);
            cart = []; renderCart();
        }

        syncMenu(); renderCart();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>Takka Dashboard | الإدارة الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #f0f9ff; --surface: #ffffff; --text: #0f172a; --border: #e0f2fe; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; }
        
        /* القائمة الجانبية */
        .sidebar { width: 260px; background: var(--surface); border-left: 2px solid var(--border); display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(14, 165, 233, 0.05); }
        .logo-area { padding: 24px; display: flex; align-items: center; gap: 12px; color: var(--primary); font-weight: 900; font-size: 24px; border-bottom: 2px solid var(--border); }
        .nav-item { padding: 16px 24px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; color: #475569; transition: 0.2s; border-right: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background: var(--bg); color: var(--primary); border-color: var(--primary); }
        
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--surface); padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); }
        .content { padding: 30px; overflow-y: auto; flex: 1; }
        
        /* النافذة الاحترافية (Modal) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-card { background: var(--surface); width: 450px; border-radius: 20px; padding: 30px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); animation: popUp 0.3s ease-out; }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-card h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #475569; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .form-group input:focus { border-color: var(--primary); outline: none; }
        
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-modal-save { flex: 1; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-modal-cancel { flex: 1; background: #f1f5f9; color: #475569; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* الأزرار والجداول */
        .btn-blue { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        th, td { padding: 16px; border-bottom: 1px solid var(--border); text-align: right; }
        th { background: #f8fafc; color: #475569; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="productModal">
        <div class="modal-card">
            <h2 id="m-title-p">إضافة منتج جديد</h2>
            <div class="form-group">
                <label id="l-p-name">اسم المنتج</label>
                <input type="text" id="inp-p-name" placeholder="مثلاً: شاورما دجاج عائلي">
            </div>
            <div class="form-group">
                <label id="l-p-price">السعر (ج.م)</label>
                <input type="number" id="inp-p-price" placeholder="0.00">
            </div>
            <div class="form-group">
                <label id="l-p-cat">التصنيف</label>
                <select id="inp-p-category">
                    </select>
            </div>
            <div class="modal-btns">
                <button class="btn-modal-save" onclick="saveProduct()">حفظ المنتج</button>
                <button class="btn-modal-cancel" onclick="closeModals()">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="categoryModal">
        <div class="modal-card">
            <h2 id="m-title-c">إضافة تصنيف جديد</h2>
            <div class="form-group">
                <label id="l-c-name">اسم التصنيف</label>
                <input type="text" id="inp-c-name" placeholder="مثلاً: مشروبات، ساندوتشات">
            </div>
            <div class="modal-btns">
                <button class="btn-modal-save" onclick="saveCategory()">حفظ التصنيف</button>
                <button class="btn-modal-cancel" onclick="closeModals()">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo-area">TAKKA</div>
        <div class="nav-item active" onclick="switchTab('Overview')" id="n-over">نظرة عامة</div>
        <div class="nav-item" onclick="switchTab('Products')" id="n-prod">المنتجات</div>
        <div class="nav-item" onclick="switchTab('Categories')" id="n-cat">التصنيفات</div>
        <div class="nav-item" onclick="switchTab('Reports')" id="n-rep">التقارير</div>
    </div>

    <div class="main-area">
        <div class="topbar">
            <div style="font-weight:bold; color:var(--primary);">نظام إدارة تاكا السحابي</div>
            <button class="btn-blue" style="background:none; color:var(--primary); border:1px solid var(--primary)" onclick="toggleLang()" id="t-lang">English</button>
        </div>
        <div class="content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h1 id="page-title">نظرة عامة</h1>
                <div id="action-buttons"></div>
            </div>
            <div id="main-container"></div>
        </div>
    </div>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let currentTab = 'Overview';
        let lang = 'ar';

        const dict = {
            ar: { over: 'نظرة عامة', prod: 'المنتجات', cat: 'التصنيفات', rep: 'التقارير', addP: '+ إضافة منتج', addC: '+ إضافة تصنيف' },
            en: { over: 'Overview', prod: 'Products', cat: 'Categories', rep: 'Reports', addP: '+ Add Product', addC: '+ Add Category' }
        };

        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        async function openProductModal() {
            document.getElementById('productModal').style.display = 'flex';
            // سحب التصنيفات عشان نحطها في القائمة المنسدلة
            const { data } = await supabaseClient.from('categories').select('name');
            const select = document.getElementById('inp-p-category');
            if(data) {
                select.innerHTML = data.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            }
        }

        async function saveProduct() {
            const name = document.getElementById('inp-p-name').value;
            const price = document.getElementById('inp-p-price').value;
            const category = document.getElementById('inp-p-category').value;
            
            if(!name || !price || !category) return alert("الرجاء ملئ جميع الخانات");
            
            const { error } = await supabaseClient.from('products').insert([{ name, price, category }]);
            if(error) alert("خطأ: " + error.message);
            else { closeModals(); switchTab('Products'); }
        }

        function openCategoryModal() { document.getElementById('categoryModal').style.display = 'flex'; }

        async function saveCategory() {
            const name = document.getElementById('inp-c-name').value;
            if(!name) return alert("أدخل اسم التصنيف");
            const { error } = await supabaseClient.from('categories').insert([{ name }]);
            if(error) alert("خطأ: " + error.message);
            else { closeModals(); switchTab('Categories'); }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('page-title').innerText = dict[lang][{ 'Overview': 'over', 'Products': 'prod', 'Categories': 'cat', 'Reports': 'rep' }[tab]];
            const btns = document.getElementById('action-buttons');

            if (tab === 'Products') {
                btns.innerHTML = `<button class="btn-blue" onclick="openProductModal()">${dict[lang].addP}</button>`;
                loadTableData('products');
            } else if (tab === 'Categories') {
                btns.innerHTML = `<button class="btn-blue" onclick="openCategoryModal()">${dict[lang].addC}</button>`;
                loadTableData('categories');
            } else if (tab === 'Overview') {
                btns.innerHTML = '';
                renderOverview();
            } else {
                btns.innerHTML = '';
                loadTableData('sales');
            }
        }

        async function loadTableData(table) {
            const cont = document.getElementById('main-container');
            const { data, error } = await supabaseClient.from(table).select('*').order('id', {ascending: false});
            if(error) { cont.innerHTML = `<p style="color:red">Error: ${error.message}</p>`; return; }
            
            let html = `<table><thead><tr>`;
            if(data[0]) Object.keys(data[0]).forEach(k => { if(k !== 'id') html += `<th>${k}</th>`; });
            html += `<th>إجراء</th></tr></thead><tbody>`;
            data.forEach(row => {
                html += `<tr>`;
                Object.keys(row).forEach(k => { if(k !== 'id') html += `<td>${row[k]}</td>`; });
                html += `<td><button onclick="deleteRecord('${table}', ${row.id})" style="color:red; border:none; background:none; cursor:pointer">حذف</button></td></tr>`;
            });
            cont.innerHTML = html + `</tbody></table>`;
        }

        async function deleteRecord(table, id) {
            if(confirm("هل أنت متأكد؟")) {
                await supabaseClient.from(table).delete().eq('id', id);
                switchTab(currentTab);
            }
        }

        async function renderOverview() {
            const { data } = await supabaseClient.from('sales').select('*');
            document.getElementById('main-container').innerHTML = `
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div style="background:white; padding:30px; border-radius:20px; border:2px solid var(--border)">
                        <h3>إجمالي المبيعات</h3>
                        <h1 style="color:var(--primary)">${data ? data.reduce((s,o)=>s+o.total,0) : 0} ج.م</h1>
                    </div>
                    <div style="background:white; padding:30px; border-radius:20px; border:2px solid var(--border)">
                        <h3>عدد الطلبات</h3>
                        <h1 style="color:var(--primary)">${data ? data.length : 0}</h1>
                    </div>
                </div>
            `;
        }

        switchTab('Overview');
    </script>
</body>
</html>

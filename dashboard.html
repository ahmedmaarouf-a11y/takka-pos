<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Takka Dashboard | الإدارة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-blue: #2563eb; --dark-bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; }
        body { font-family: system-ui; background: var(--dark-bg); color: var(--text); padding: 40px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .stats-grid { display: flex; gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 30px; border-radius: 20px; flex: 1; border: 1px solid #334155; text-align: center; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        .stat-card h3 { color: #94a3b8; margin: 0; font-size: 16px; }
        .stat-card h2 { color: var(--main-blue); font-size: 32px; margin: 10px 0 0 0; }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 15px; overflow: hidden; }
        th, td { padding: 18px; text-align: right; border-bottom: 1px solid #334155; }
        th { background: #1e293b; color: var(--main-blue); font-size: 14px; text-transform: uppercase; }
        tr:hover { background: rgba(37, 99, 235, 0.05); }
        
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .badge-active { background: #f59e0b; color: #fff; }
        .badge-done { background: #10b981; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>لوحة تحكم تاكا 📈</h1>
        <div id="clock" style="font-size: 20px; color: var(--main-blue);"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>إجمالي مبيعات اليوم</h3><h2 id="today-total">0 ج.م</h2></div>
        <div class="stat-card"><h3>عدد الطلبات</h3><h2 id="order-count">0</h2></div>
        <div class="stat-card"><h3>طلبات في المطبخ</h3><h2 id="kitchen-count">0</h2></div>
    </div>

    <table>
        <thead>
            <tr><th>رقم الطلب</th><th>الأصناف</th><th>الإجمالي</th><th>الحالة</th><th>التوقيت</th></tr>
        </thead>
        <tbody id="sales-body">
            </tbody>
    </table>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function refreshData() {
            const { data, error } = await supabaseClient.from('sales').select('*').order('created_at', {ascending: false});
            if (data) {
                // تحديث الكروت
                const total = data.filter(o => o.status === 'Completed').reduce((s, o) => s + o.total, 0);
                document.getElementById('today-total').innerText = total + " ج.م";
                document.getElementById('order-count').innerText = data.length;
                document.getElementById('kitchen-count').innerText = data.filter(o => o.status === 'Active').length;

                // تحديث الجدول
                document.getElementById('sales-body').innerHTML = data.map(o => `
                    <tr>
                        <td><b>#${o.order_no}</b></td>
                        <td>${o.items}</td>
                        <td>${o.total} ج.م</td>
                        <td><span class="badge ${o.status === 'Active' ? 'badge-active' : 'badge-done'}">${o.status === 'Active' ? 'في المطبخ' : 'تم الدفع'}</span></td>
                        <td>${new Date(o.created_at).toLocaleTimeString('ar-EG')}</td>
                    </tr>
                `).join('');
            }
        }

        setInterval(refreshData, 5000); // تحديث كل 5 ثواني
        refreshData();

        // ساعة للمنظرة
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takka Dashboard | لوحة التحكم الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* تعريف الألوان المريحة للعين */
        :root { --primary: #0084d1; --bg: #f0f9ff; --sidebar-bg: #f8fbfd; --glass: rgba(255, 255, 255, 0.7); --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; }
        
        /* القائمة الجانبية الفخمة باللون الأبيض الشفاف */
        .sidebar { width: 250px; background: var(--sidebar-bg); border-left: 1px solid rgba(0, 132, 209, 0.1); display: flex; flex-direction: column; }
        .logo-area { padding: 24px; display: flex; align-items: center; gap: 10px; color: var(--primary); font-weight: 900; font-size: 24px; border-bottom: 1px solid rgba(0, 132, 209, 0.1); }
        .logo-area svg { width: 30px; height: 30px; }
        .nav-item { padding: 16px 24px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; color: #475569; transition: 0.2s; border-right: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background: rgba(0, 132, 209, 0.05); color: var(--primary); border-color: var(--primary); }
        
        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        /* شريط علوي شفاف */
        .topbar { background: var(--glass); backdrop-filter: blur(10px); padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 132, 209, 0.1); }
        .status-dot { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 13px; color: #10b981; }
        .status-dot span { width: 8px; height: 8px; background: #10b981; border-radius: 50%; }
        .btn-outline { background: white; border: 1px solid #d1d5db; padding: 8px 16px; border-radius: 6px; cursor: pointer; color: #4b5563; }
        
        .content { padding: 30px; overflow-y: auto; flex: 1; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header-row h1 { margin: 0; color: #0f172a; font-size: 24px; }
        .action-btns { display: flex; gap: 10px; }
        .btn-green { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Stats & Chart (Matching Image) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid rgba(0, 132, 209, 0.1); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .stat-card h3 { color: #64748b; margin: 0 0 10px 0; font-size: 14px; }
        .stat-card h1 { color: var(--primary); margin: 0; font-size: 32px; font-weight: 900; }
        
        /* التشارت الأبيض الشفاف */
        .chart-container { background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 12px; border: 1px solid rgba(0, 132, 209, 0.1); margin-bottom: 24px; height: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        
        /* Tables الشفافة */
        .data-area { background: var(--glass); border-radius: 12px; border: 1px solid rgba(0, 132, 209, 0.1); overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 16px; border-bottom: 1px solid rgba(0, 132, 209, 0.1); }
        th { background: rgba(0, 132, 209, 0.02); color: #475569; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg> TAKKA
        </div>
        <div class="nav-item active" onclick="switchTab('Overview')" id="n-over">نظرة عامة</div>
        <div class="nav-item" onclick="switchTab('Products')" id="n-prod">المنتجات</div>
        <div class="nav-item" onclick="switchTab('Categories')" id="n-cat">التصنيفات</div>
        <div class="nav-item" onclick="switchTab('Reports')" id="n-rep">التقارير</div>
    </div>

    <div class="main-area">
        <div class="topbar">
            <div class="status-dot"><span></span> Live Updating</div>
            <button class="btn-outline" onclick="toggleLang()" id="t-lang">English</button>
        </div>

        <div class="content">
            <div class="header-row">
                <h1 id="page-title">نظرة عامة</h1>
                <div class="action-btns" id="action-buttons"></div>
            </div>
            
            <div id="main-container">
                </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let currentTab = 'Overview';
        let chartInstance = null;
        let lang = 'ar';
        
        const dict = {
            ar: { over: 'نظرة عامة', prod: 'المنتجات', cat: 'التصنيفات', rep: 'التقارير', lang: 'English', addP: '+ إضافة منتج', exp: 'تصدير (CSV)', sales: 'إجمالي المبيعات', orders: 'إجمالي الطلبات', empty: 'لا يوجد بيانات.', dir: 'rtl' },
            en: { over: 'Overview', prod: 'Products', cat: 'Categories', rep: 'Reports', lang: 'العربية', addP: '+ Add Product', exp: 'Export (CSV)', sales: 'Total Sales', orders: 'Total Orders', empty: 'No data.', dir: 'ltr' }
        };

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            document.getElementById('html-root').dir = dict[lang].dir;
            document.getElementById('n-over').innerText = dict[lang].over;
            document.getElementById('n-prod').innerText = dict[lang].prod;
            document.getElementById('n-cat').innerText = dict[lang].cat;
            document.getElementById('n-rep').innerText = dict[lang].rep;
            document.getElementById('t-lang').innerText = dict[lang].lang;
            switchTab(currentTab); // Refresh view
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget?.classList.add('active');
            
            const titleMap = { 'Overview': 'over', 'Products': 'prod', 'Categories': 'cat', 'Reports': 'rep' };
            document.getElementById('page-title').innerText = dict[lang][titleMap[tab]];
            const btns = document.getElementById('action-buttons');

            if(tab === 'Overview') {
                btns.innerHTML = '';
                renderOverview();
            } else if (tab === 'Reports') {
                btns.innerHTML = `<button class="btn-green" onclick="exportData('sales')">${dict[lang].exp}</button>`;
                loadTableData('sales');
            } else if (tab === 'Products') {
                btns.innerHTML = `<button class="btn-blue" onclick="promptAdd()">${dict[lang].addP}</button>`;
                loadTableData('products');
            }
        }

        async function renderOverview() {
            const cont = document.getElementById('main-container');
            cont.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><h3>${dict[lang].sales}</h3><h1 id="o-sales">0</h1></div>
                    <div class="stat-card"><h3>${dict[lang].orders}</h3><h1 id="o-orders">0</h1></div>
                </div>
                <div class="chart-container"><canvas id="salesChart"></canvas></div>
            `;
            
            const { data } = await supabaseClient.from('sales').select('*').eq('status','Completed').order('created_at', {ascending: true});
            if(data) {
                const total = data.reduce((s, o) => s + o.total, 0);
                document.getElementById('o-sales').innerText = total + ' ج';
                document.getElementById('o-orders').innerText = data.length;

                // رسم التشارت المطابق للصورة (النسخة الأبيض الشفافة)
                const ctx = document.getElementById('salesChart').getContext('2d');
                const labels = data.slice(-10).map(o => o.order_no);
                const chartData = data.slice(-10).map(o => o.total);
                
                if(chartInstance) chartInstance.destroy();
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets: [{ label: 'Sales Trend', data: chartData, borderColor: '#0084d1', backgroundColor: 'rgba(0,132,209,0.05)', fill: true, tension: 0.3 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
                });
            }
        }

        async function loadTableData(table) {
            const cont = document.getElementById('main-container');
            const { data } = await supabaseClient.from(table).select('*').order('id', {ascending: false});
            if(!data || !data.length) { cont.innerHTML = `<p>${dict[lang].empty}</p>`; return; }

            let html = `<div class="data-area"><table><thead><tr>`;
            Object.keys(data[0]).forEach(k => { if(k !== 'id') html += `<th>${k}</th>`; });
            if(table !== 'sales') html += `<th>إجراء</th>`;
            html += `</tr></thead><tbody>`;
            data.forEach(row => {
                html += `<tr>`;
                Object.keys(row).forEach(k => { if(k !== 'id') html += `<td style="font-weight:bold">${row[k]}</td>`; });
                if(table !== 'sales') html += `<td><button onclick="deleteRow('${table}', ${row.id})" style="color:red;background:none;border:none;cursor:pointer">X</button></td>`;
                html += `</tr>`;
            });
            cont.innerHTML = html + `</tbody></table></div>`;
        }

        async function promptAdd() {
            let name = prompt("اسم المنتج:"); let price = prompt("السعر:");
            if(name && price) {
                await supabaseClient.from('products').insert([{ name, price }]);
                loadTableData('products');
            }
        }

        async function deleteRow(table, id) {
            if(confirm("هل أنت متأكد؟")) {
                await supabaseClient.from(table).delete().eq('id', id);
                loadTableData(table);
            }
        }

        switchTab('Overview');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Takka Dashboard - الإدارة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; padding: 30px; background: #f8fafc; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: right; }
        th { background: #0f172a; color: white; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .active { background: #fef3c7; color: #92400e; }
        .done { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
    <h1>لوحة التحكم - تاكا 📊</h1>
    <div class="stats" id="stats-area">
        <div class="stat-card"><h3>مبيعات اليوم</h3><h2 id="today-sales">0 ج.م</h2></div>
        <div class="stat-card"><h3>عدد الطلبات</h3><h2 id="order-count">0</h2></div>
    </div>
    <table>
        <thead><tr><th>رقم الطلب</th><th>الأصناف</th><th>الإجمالي</th><th>الحالة</th><th>التوقيت</th></tr></thead>
        <tbody id="data-table"></tbody>
    </table>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function load() {
            const { data } = await supabaseClient.from('sales').select('*').order('created_at', {ascending: false});
            let total = data.filter(o => o.status === 'Completed').reduce((a, b) => a + b.total, 0);
            document.getElementById('today-sales').innerText = total + " ج.م";
            document.getElementById('order-count').innerText = data.length;
            document.getElementById('data-table').innerHTML = data.map(o => `
                <tr>
                    <td>${o.order_no}</td>
                    <td>${o.items}</td>
                    <td>${o.total} ج.م</td>
                    <td><span class="status ${o.status === 'Active' ? 'active' : 'done'}">${o.status === 'Active' ? 'في المطبخ' : 'تم الدفع'}</span></td>
                    <td>${new Date(o.created_at).toLocaleTimeString('ar-EG')}</td>
                </tr>
            `).join('');
        }
        setInterval(load, 5000); // تحديث تلقائي كل 5 ثواني
        load();
    </script>
</body>
</html>

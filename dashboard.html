<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takka Dashboard | الإدارة المتقدمة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --border: #e2e8f0; --sidebar: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background-color: var(--bg); color: var(--text); }
        
        /* القائمة الجانبية للإدارة */
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; }
        .brand { padding: 30px 20px; text-align: center; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .brand svg { width: 50px; height: 50px; color: var(--primary); margin-bottom: 10px; }
        .nav-btn { padding: 15px 25px; color: #cbd5e1; cursor: pointer; transition: 0.3s; font-size: 1.1rem; border-right: 4px solid transparent; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { background: #1e293b; color: white; }
        .nav-btn.active { background: #1e293b; color: var(--primary); border-color: var(--primary); font-weight: bold; }

        /* منطقة المحتوى */
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-pane { display: none; animation: fadeIn 0.3s ease; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; margin-top: 0; margin-bottom: 30px; }

        /* كروت الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 25px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); text-align: center; }
        .stat-card h3 { color: #64748b; margin: 0 0 10px 0; font-size: 1rem; }
        .stat-card h1 { color: var(--primary); margin: 0; font-size: 2.5rem; font-weight: 900; }

        /* الجداول */
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid var(--border); }
        th, td { padding: 18px; text-align: right; border-bottom: 1px solid var(--border); }
        th { background: #f1f5f9; color: #475569; font-weight: bold; }
        tr:hover { background: #f8fafc; }

        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .badge.active { background: #fef3c7; color: #b45309; }
        .badge.completed { background: #dcfce7; color: #15803d; }

        /* الأزرار والإدخال */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        
        .form-group { display: flex; gap: 15px; margin-bottom: 25px; background: var(--surface); padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        input { flex: 1; padding: 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="3" y1="9" x2="21" y2="9"></line>
                <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
            <h2 style="margin: 0; color: white; border: none;">Admin Panel</h2>
        </div>
        <div class="nav-btn active" onclick="switchTab('reports', this)">📊 التقارير والمبيعات</div>
        <div class="nav-btn" onclick="switchTab('kitchen', this)">👨‍🍳 طلبات المطبخ</div>
        <div class="nav-btn" onclick="switchTab('menu', this)">⚙️ إدارة الأصناف</div>
    </div>

    <div class="content">
        <div id="tab-reports" class="tab-pane active">
            <h2>تقارير اليوم</h2>
            <div class="stats-grid">
                <div class="stat-card"><h3>إجمالي المبيعات</h3><h1 id="rep-total">0 <span style="font-size:1rem; color:#64748b">ج.م</span></h1></div>
                <div class="stat-card"><h3>إجمالي الطلبات</h3><h1 id="rep-count">0</h1></div>
            </div>
            <table>
                <thead><tr><th>رقم الطلب</th><th>الأصناف</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ والوقت</th></tr></thead>
                <tbody id="reports-table"></tbody>
            </table>
        </div>

        <div id="tab-kitchen" class="tab-pane">
            <h2>شاشة المطبخ (طلبات نشطة)</h2>
            <div id="kitchen-orders" style="display: flex; flex-direction: column; gap: 15px;">
                </div>
        </div>

        <div id="tab-menu" class="tab-pane">
            <h2>إضافة وإدارة الأصناف</h2>
            <div class="form-group">
                <input type="text" id="p-name" placeholder="اسم الصنف الجديد (مثال: شاورما لحم)">
                <input type="number" id="p-price" placeholder="السعر (مثال: 100)">
                <button class="btn btn-primary" style="padding: 0 40px;" onclick="addProduct()">➕ إضافة الصنف</button>
            </div>
            <table>
                <thead><tr><th>اسم الصنف</th><th>السعر</th><th>إجراء</th></tr></thead>
                <tbody id="products-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SB_URL = "https://rcsssyzajtqwyqzcjglx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjc3NzeXphanRxd3lxemNqZ2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDM3MDAsImV4cCI6MjA5MjAxOTcwMH0.m2typ0cHiAQ5K9SdJ6YaVVEIrP-8s0Z3saVA4zuBYwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            element.classList.add('active');
            
            if(tabId === 'reports') fetchReports();
            if(tabId === 'kitchen') fetchKitchen();
            if(tabId === 'menu') fetchProductsAdmin();
        }

        // --- وظائف التقارير ---
        async function fetchReports() {
            const { data } = await supabaseClient.from('sales').select('*').order('created_at', { ascending: false });
            if (data) {
                const totalSales = data.filter(o => o.status === 'Completed').reduce((sum, o) => sum + o.total, 0);
                document.getElementById('rep-total').innerHTML = `${totalSales} <span style="font-size:1rem; color:#64748b">ج.م</span>`;
                document.getElementById('rep-count').innerText = data.length;

                document.getElementById('reports-table').innerHTML = data.map(o => `
                    <tr>
                        <td style="font-weight:bold;">${o.order_no}</td>
                        <td>${o.items}</td>
                        <td style="font-weight:bold; color:var(--primary);">${o.total} ج.م</td>
                        <td><span class="badge ${o.status === 'Active' ? 'active' : 'completed'}">${o.status === 'Active' ? 'في المطبخ' : 'مكتمل ودُفع'}</span></td>
                        <td style="color:#64748b; font-size:0.9rem;">${new Date(o.created_at).toLocaleString('ar-EG')}</td>
                    </tr>
                `).join('');
            }
        }

        // --- وظائف المطبخ ---
        async function fetchKitchen() {
            const { data } = await supabaseClient.from('sales').select('*').eq('status', 'Active').order('created_at', { ascending: true });
            const container = document.getElementById('kitchen-orders');
            if (!data || data.length === 0) {
                container.innerHTML = '<p style="color:#64748b;">لا يوجد طلبات في المطبخ حالياً.</p>';
                return;
            }
            container.innerHTML = data.map(o => `
                <div style="background:var(--surface); border:1px solid var(--border); border-right:5px solid #f59e0b; border-radius:10px; padding:20px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h3 style="margin:0 0 10px 0; color:var(--primary);">${o.order_no}</h3>
                        <p style="margin:0; font-size:1.2rem; font-weight:bold;">${o.items}</p>
                    </div>
                    <button class="btn btn-success" onclick="markAsCompleted(${o.id})">✔️ تم التحضير والدفع</button>
                </div>
            `).join('');
        }

        async function markAsCompleted(orderId) {
            await supabaseClient.from('sales').update({ status: 'Completed' }).eq('id', orderId);
            fetchKitchen(); // تحديث المطبخ
            fetchReports(); // تحديث التقارير في الخلفية
        }

        // --- وظائف إدارة الأصناف ---
        async function fetchProductsAdmin() {
            const { data } = await supabaseClient.from('products').select('*').order('id', { ascending: false });
            if(data) {
                document.getElementById('products-table').innerHTML = data.map(p => `
                    <tr>
                        <td style="font-weight:bold;">${p.name}</td>
                        <td style="color:var(--primary); font-weight:bold;">${p.price} ج.م</td>
                        <td><button class="btn btn-danger" onclick="deleteProduct(${p.id})">حذف</button></td>
                    </tr>
                `).join('');
            }
        }

        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            if (!name || !price) return alert("يرجى إدخال اسم وسعر الصنف");
            
            await supabaseClient.from('products').insert([{ name, price }]);
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            fetchProductsAdmin();
        }

        async function deleteProduct(id) {
            if (confirm("هل أنت متأكد من مسح هذا الصنف؟")) {
                await supabaseClient.from('products').delete().eq('id', id);
                fetchProductsAdmin();
            }
        }

        // تشغيل أولي
        fetchReports();
        setInterval(fetchReports, 10000); // تحديث التقارير أوتوماتيك كل 10 ثواني
    </script>
</body>
</html>
